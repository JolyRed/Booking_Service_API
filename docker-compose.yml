version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: booking_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: booking_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: booking_api
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/booking_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    build: .
    container_name: booking_celery_worker
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/booking_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - .:/app

  celery_beat:
    build: .
    container_name: booking_celery_beat
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/booking_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data: