name: Tests & Linting

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_booking_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run migrations
      env:
        DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_booking_db
        SECRET_KEY: test-secret-key-min-32-chars-abcdefgh
        REDIS_URL: redis://localhost:6379/0
      run: |
        alembic upgrade head

    - name: Run pytest
      env:
        DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_booking_db
        SECRET_KEY: test-secret-key-min-32-chars-abcdefgh
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest tests/ -v --cov=app --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

    - name: Run linting (flake8)
      run: |
        pip install flake8
        # ignore long lines and line break before operator
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics

  race-condition-test:
    runs-on: ubuntu-latest
    needs: tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_booking_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run migrations
      env:
        DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_booking_db
        SECRET_KEY: test-secret-key-min-32-chars-abcdefgh
        REDIS_URL: redis://localhost:6379/0
      run: |
        alembic upgrade head

    - name: Run race-condition tests
      env:
        DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_booking_db
        SECRET_KEY: test-secret-key-min-32-chars-abcdefgh
        REDIS_URL: redis://localhost:6379/0
      run: |
        # Override conftest to use PostgreSQL for race tests
        pytest tests/test_race_booking.py -v
